version: "3"

dotenv:
  - .env.local

vars:
  FRONTEND_DIR: frontend
  BACKEND_VENV: .venv
  PYTHON_BOOTSTRAP: '{{if eq OS "windows"}}python{{else}}python3{{end}}'
  BACKEND_PYTHON: '{{if eq OS "windows"}}{{.BACKEND_VENV}}/Scripts/python.exe{{else}}{{.BACKEND_VENV}}/bin/python{{end}}'
  BACKEND_HOST: 127.0.0.1
  BACKEND_PORT: 8000

tasks:
  default:
    desc: List available development tasks
    cmds:
      - task --list

  dev:
    desc: Start backend and frontend development servers in parallel
    deps:
      - task: backend:dev
      - task: frontend:dev

  backend:dev:
    desc: Start the FastAPI market data backend
    preconditions:
      - sh: "{{.BACKEND_PYTHON}} --version"
        msg: "Backend virtualenv is missing. Run: task backend:install"
      - sh: "{{.BACKEND_PYTHON}} -c \"import akshare, fastapi, uvicorn\""
        msg: "Backend dependencies are missing. Run: task backend:install"
    cmds:
      - "{{.BACKEND_PYTHON}} -m uvicorn backend.app.main:app --reload --host {{.BACKEND_HOST}} --port {{.BACKEND_PORT}}"

  frontend:dev:
    desc: Start the Next.js frontend
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run dev

  backend:install:
    desc: Install backend Python dependencies
    cmds:
      - "{{.PYTHON_BOOTSTRAP}} -m venv {{.BACKEND_VENV}}"
      - "{{.BACKEND_PYTHON}} -m pip install -r backend/requirements-dev.txt"

  frontend:install:
    desc: Install frontend Node dependencies
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm install

  install:
    desc: Install backend and frontend dependencies
    deps:
      - task: backend:install
      - task: frontend:install

  lint:
    desc: Run frontend lint checks
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run lint

  build:
    desc: Build the frontend
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run build

  backend:check:
    desc: Check backend Python syntax
    cmds:
      - "{{.BACKEND_PYTHON}} -m py_compile backend/app/main.py backend/app/services/*.py"

  backend:test:
    desc: Run backend unit tests
    cmds:
      - "{{.BACKEND_PYTHON}} -m unittest discover backend -p '*_test.py'"

  db:migrate:
    desc: Apply PostgreSQL schema migrations
    cmds:
      - "{{.BACKEND_PYTHON}} -m backend.app.db.migrations"

  db:stamp:
    desc: Mark a legacy PostgreSQL schema as migrated after verifying it matches the baseline
    cmds:
      - "{{.BACKEND_PYTHON}} -m alembic -c alembic.ini stamp head"

  backend:lint:
    desc: Run backend Pylint checks
    preconditions:
      - sh: "{{.BACKEND_PYTHON}} --version"
        msg: "Backend virtualenv is missing. Run: task backend:install"
      - sh: "{{.BACKEND_PYTHON}} -m pylint --version"
        msg: "Pylint is missing. Run: task backend:install"
    cmds:
      - "{{.BACKEND_PYTHON}} -m pylint backend"

  check:
    desc: Run project checks
    deps:
      - task: backend:check
      - task: backend:test
      - task: backend:lint
      - task: lint
      - task: build

  docker:dev:
    desc: Start frontend, backend, PostgreSQL, and Redis with Docker Compose
    cmds:
      - docker compose up --build

  docker:down:
    desc: Stop Docker Compose services
    cmds:
      - docker compose down

  docker:logs:
    desc: Follow Docker Compose logs
    cmds:
      - docker compose logs -f
